# Cambiar fuente
font_family Hack Nerd Font Mono
bold_font           auto
italic_font         auto
bold_italic_font    auto
# Tamano de fuente
font_size 12.0

# Background
# background #00f0ff
# backfround_opacity 0.0
#background_image /usr/share/backgrounds/bg-kitty.jpg
#background_image_layout scaled
#background_image_linear 0.5
# background_tint 0.4

# Foreground


# Cursor

# scrollback
scrollback_lines 10000

# Diviciones y pestanas
# enable_layout_restore yes

# KeyBindings
map ctrl+shift+t new_tab

map Home send_text all \x1b[1~
map End send_text all \x1b[4~
