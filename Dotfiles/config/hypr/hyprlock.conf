$font = Monospace

general {
    hide_cursor = true
}

animations {
    enabled = true
    bezier = linear, 1, 1, 0, 0
    animation = fadeIn, 1, 5, linear
    animation = fadeOut, 1, 5, linear
    animation = inputFieldDots, 1, 2, linear
}

background {
    monitor = eDP-1
    path = /home/doom/.config/hypr/wallpapers/wallpaper.png
    blur_passes = 0
    color = rgba(0,0,0,0.90)
}

input-field {
    monitor =
    size = 20%, 5%
    outline_thickness = 3
    inner_color = rgba(0, 0, 0, 0.0) # no fill

    outer_color = rgba(0, 0, 0, 0.0) # estado base
    check_color = rgba(0, 0, 0, 0.0) # estado de revicion
    fail_color = rgb(255, 0, 0) # estado de fallo

    font_color = rgb(143, 143, 143)
    fade_on_empty = false
    rounding = 15

    font_family = $font
    placeholder_text = Input password...
    fail_text = $PAMFAIL

    # uncomment to use a letter instead of a dot to indicate the typed password
    dots_text_format = *
    dots_size = 0.2
    dots_spacing = 0.3

    # uncomment to use an input indicator that does not show the password length (similar to swaylock's input indicator)
    # hide_input = true

    position = 5, 5
    halign = left
    valign = bottom
}

# HORA
label {
    monitor =
    # text = $TIME # ref. https://wiki.hyprland.org/Hypr-Ecosystem/hyprlock/#variable-substitution
    text = cmd[update:60000] LC_TIME=en_US.UTF-8 date +"%I:%M %p"
    color = rgba(143, 143, 143, 0.5)
    font_size = 30
    font_family = $font

    position = -40, 40
    halign = right
    valign = button
}

# FECHA
label {
    monitor =
    text = cmd[update:60000] date +"%a, %d %b %Y" # update every 60 seconds
    color = rgba(143, 143, 143, 0.5)
    font_size = 20
    font_family = $font

    position = -10, 8
    halign = right
    valign = button
}