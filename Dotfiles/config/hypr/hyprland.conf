# Monitor config
monitor=eDP-1,preferred,auto,1

# Autostart
exec = ~/.config/hypr/scripts/init
exec-once = /usr/lib/polkit-kde-authentication-agent-1

# Variables
$terminal = kitty
$fileManager = thunar
$menu = fuzzel
$browser = firefox
$mainMod = SUPER

# Input config
input {
    kb_layout = us,latam
    kb_options = grp:win_space_toggle
    
    follow_mouse = 1
    sensitivity = 0
    
    touchpad {
        natural_scroll = false
    }
}

# General appearance
general {
    gaps_in = 6
    gaps_out = 12
    border_size = 3

    col.active_border = rgb(FF1515) rgb(000000)
    col.inactive_border = rgba(202020aa)

    layout = dwindle
}

# Decoraciones
decoration {
    rounding = 15
    active_opacity = 0.9
    inactive_opacity = 0.8
    
    blur {
        enabled = true
        size = 6
        passes = 1
        vibrancy = 1.0
        new_optimizations = true
    }

    shadow {
        enabled = true
        range = 10
        render_power = 4
        color = rgba(000000a0)
    }
}

# Animaciones
animations {
    enabled = true
    
    bezier = overshot, 0.13, 0.99, 0.29, 1.1
    bezier = smoothOut, 0.2, 0.8, 0.2, 1.0
    
    animation = windows, 1, 6, overshot, slide
    animation = windowsOut, 1, 5, smoothOut, popin 70%
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, smoothOut
}

# Layouts
dwindle {
    pseudotile = true
    preserve_split = true
    force_split = 2
}

misc {
    disable_hyprland_logo = true
    mouse_move_enables_dpms = true
    enable_swallow = true
}

# Reglas de ventanas (ejemplos)
# windowrulev2 = float,class:(pavucontrol)
# windowrulev2 = float,class:(thunar), title:(File Operation Progress)
# windowrulev2 = opacity 0.8 0.8, class:^(kitty)$
# windowsulev2 = opacity 1.0 1.0, class:^(VSCodium)$
# windowrulev2 = fullscreen, class:^(firefox), title:^(Picture-in-Picture)
# 
# windowrulev2 = noanim, class:^(wofi)$
# windowrulev2 = noblur, class:^(wofi)$
# windowrulev2 = nofocus, class:^(wofi)$
# windowrulev2 = noinitialfocus, class:^(wofi)$
# windowrulev2 = opacity 1.0 1.0, class:^(wofi)$
# Reglas generales
windowrule = float 1, match:class (pavucontrol)
windowrule = float 1, match:class (thunar), match:title (File Operation Progress)

# Opacidad
windowrule = opacity 0.8 0.8, match:class ^(kitty)$
windowrule = opacity 1.0 1.0, match:class ^(VSCodium)$

# Firefox Picture-in-Picture
windowrule = float 1, pin 1, match:class ^(firefox), match:title ^(Picture-in-Picture)

# Wofi (Optimizado en una sola línea para que sea más limpio)
windowrule = no_anim on, no_blur on, no_focus on, no_initial_focus on, opacity 1.0 1.0, match:class ^(wofi)$


# Aplicaciones
bind = $mainMod ALT, Q, exit
bind = $mainMod ALT, R, exec, hyprctl reload && notify-send "Hyprland recargado"
bind = $mainMod, Return, exec, $terminal
bind = $mainMod, W, killactive
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, B, exec, $browser
bind = $mainMod, D, exec, $menu
bind = $mainMod, H, exec, /home/doom/.config/hypr/scripts/monitors

bind = $mainMod, V, togglefloating
bind = $mainMod, P, pseudo
bind = $mainMod, J, togglesplit
bind = $mainMod, F, fullscreen

# Screenshots
bind = , Print, exec, grim -g "$(slurp)" ~/.Media/Screenshots/Screenshot-$(date +%Y%m%d-%H%M%S).png
bind = $mainMod, Print, exec, grim ~/.Media/Screenshots/Screenshot-$(date +%Y%m%d-%H%M%S).png

# Mover foco con mainMod + flechas
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Mover ventanas con flechas
bind = $mainMod SHIFT, LEFT, movewindow, l
bind = $mainMod SHIFT, RIGHT, movewindow, r
bind = $mainMod SHIFT, UP, movewindow, u
bind = $mainMod SHIFT, DOWN, movewindow, d

# Resize ventana
binde = $mainMod ALT, LEFT,  resizeactive, -20 0
binde = $mainMod ALT, RIGHT, resizeactive, 20 0
binde = $mainMod ALT, UP,    resizeactive, 0 -20
binde = $mainMod ALT, DOWN,  resizeactive, 0 20

# Cambiar de workspace
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6

# Mover ventana a workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6

# Scroll para cambiar workspaces
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Mover/resize ventanas con mouse
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Multimedia
binde = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
binde = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
binde = , XF86MonBrightnessUp, exec, brightnessctl set +5%
binde = , XF86MonBrightnessDown, exec, brightnessctl set 5%-
